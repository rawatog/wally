name: Backend Build & Push

on:
  push:
    branches:
      - main
    paths:
      - '/'

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build & push image with SHA tag (IMPORTANT CHANGE)
      - uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wally:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/wally:latest

      # 5. Update Kubernetes manifest (IMPORTANT NEW STEP)
      - name: Update K8s manifest image tag
        run: |
          yq e '.image.tag = strenv(GITHUB_SHA)' -i k8s/wally/values.yaml

      # 6. Commit and push manifest change
      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/wally/values.yaml
          git commit -m "Update backend image to ${GITHUB_SHA}" || echo "No changes"
          git push
        
