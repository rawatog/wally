apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      initContainers:
        - name: migrate
          image: mjrwt69/wally:latest
          command: ["python", "manage.py", "migrate"]
          envFrom:
            - secretRef:
                name: django-db-secret

      containers:
        - name: django
          image: mjrwt69/wally:latest
          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: django-db-secret

          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
